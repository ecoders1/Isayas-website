<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Login – Isayas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-body">

  <div class="login-page">
    <!-- Blobs -->
    <div class="hero-bg-blobs" aria-hidden="true">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div class="login-card glass-card">
      <div class="login-header">
        <div class="login-logo">
          <span class="logo-dot">I</span>sayas
        </div>
        <h1 class="login-title">Admin Panel</h1>
        <p class="login-sub">Sign in to manage your portfolio</p>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <div class="form-group">
          <label for="loginEmail" class="form-label">
            <i class="fas fa-envelope"></i> Email
          </label>
          <input
            type="email" id="loginEmail" name="email"
            class="form-input" placeholder="milkiyaas43@gmail.com"
            required autocomplete="email" aria-required="true"
          />
        </div>

        <div class="form-group">
          <label for="loginPassword" class="form-label">
            <i class="fas fa-lock"></i> Password
          </label>
          <div class="input-wrap">
            <input
              type="password" id="loginPassword" name="password"
              class="form-input" placeholder="••••••••"
              required autocomplete="current-password" aria-required="true"
            />
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password">
              <i class="fas fa-eye" id="pwIcon"></i>
            </button>
          </div>
        </div>

        <div class="form-status" id="loginStatus" role="alert" aria-live="polite"></div>

        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i>
          <span>Sign In</span>
        </button>
      </form>

      <a href="../index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Portfolio
      </a>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/env-config.js"></script>
  <script type="module" src="../js/admin-login.js"></script>
</body>
</html>
